_schema-version: 3.3.0
ID: student_enroll_app
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: student_enroll_app-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: student_enroll_app-db
      - name: student_enroll_app-auth
      - name: student_enroll_app-destination

  - name: student_enroll_app-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: student_enroll_app-db

  - name: student_enroll_app-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: student_enroll_appcourses_app
          artifacts:
            - courses_app.zip
          target-path: app/
    requires:
      - name: student_enroll_app-auth
      - name: srv-api
      - name: student_enroll_app-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: student_enroll_appcourses_app
    type: html5
    path: app/courses_app
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: student_enroll_app-destinations
    type: com.sap.application.content
    requires:
      - name: student_enroll_app-auth
        parameters:
          service-key:
            name: student_enroll_app-auth-key
      - name: student_enroll_app-html5-repo-host
        parameters:
          service-key:
            name: student_enroll_app-html5-repo-host-key
      - name: srv-api
      - name: student_enroll_app-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: student_enroll_app-html5-repository
              ServiceInstanceName: student_enroll_app-html5-repo-host
              ServiceKeyName: student_enroll_app-html5-repo-host-key
              sap.cloud.service: student_enroll_app.service
            - Name: student_enroll_app-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: student_enroll_app-auth
              ServiceKeyName: student_enroll_app-auth-key
              sap.cloud.service: student_enroll_app.service

resources:
  - name: student_enroll_app-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: student_enroll_app-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: student_enroll_app-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'admin (student_enroll_app ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.admin'
          - name: 'employee (student_enroll_app ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.employee'
  - name: student_enroll_app-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api

  - name: student_enroll_app-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: student_enroll_app-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime